<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO — Lista de Tarefas</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ─────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0b0b;
      --surface:   #141414;
      --surface2:  #1c1c1c;
      --border:    #272727;
      --border2:   #333;
      --accent:    #d4f244;
      --accent-dim:#a8c235;
      --text:      #ececec;
      --muted:     #555;
      --muted2:    #888;
      --danger:    #ff5858;
      --success:   #4dffb4;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-mono:  'JetBrains Mono', monospace;
      --radius:     4px;
      --trans:      0.22s cubic-bezier(.4,0,.2,1);
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Wrapper ───────────────────────────────── */
    .app {
      width: 100%;
      max-width: 640px;
    }

    /* ── Header ────────────────────────────────── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 40px;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .app-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .app-title {
      font-family: var(--font-serif);
      font-size: clamp(48px, 8vw, 72px);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .app-title em {
      font-style: italic;
      color: var(--accent);
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      padding-bottom: 6px;
    }

    .task-counter {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted2);
      letter-spacing: 0.1em;
    }

    .task-counter strong {
      font-size: 28px;
      font-weight: 300;
      color: var(--text);
      line-height: 1;
    }

    /* ── Progress bar ──────────────────────────── */
    .progress-wrap {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 36px;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 8px var(--accent);
    }

    /* ── Toast ─────────────────────────────────── */
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.04em;
      padding: 12px 20px;
      border-radius: var(--radius);
      z-index: 100;
      transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
      opacity: 0;
      min-width: 240px;
      text-align: center;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.error  { border-color: var(--danger);  color: var(--danger); }
    .toast.success{ border-color: var(--success); color: var(--success); }

    /* ── Input Section ─────────────────────────── */
    .input-section {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      transition: border-color var(--trans);
      margin-bottom: 32px;
    }

    .input-section:focus-within {
      border-color: var(--accent);
    }

    .task-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      padding: 16px 18px;
      letter-spacing: 0.02em;
    }

    .task-input::placeholder {
      color: var(--muted);
      font-style: italic;
    }

    .add-btn {
      background: transparent;
      border: none;
      border-left: 1px solid var(--border);
      color: var(--muted2);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0 20px;
      cursor: pointer;
      transition: background var(--trans), color var(--trans);
      white-space: nowrap;
    }

    .add-btn:hover {
      background: var(--accent);
      color: var(--bg);
      border-left-color: var(--accent);
    }

    /* ── Limit indicator ───────────────────────── */
    .limit-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .limit-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .limit-dots {
      display: flex;
      gap: 5px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border2);
      transition: background 0.3s;
    }

    .dot.filled {
      background: var(--accent);
    }

    .dot.filled-done {
      background: var(--muted);
    }

    /* ── Task List ─────────────────────────────── */
    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.3s cubic-bezier(.4,0,.2,1) forwards;
      opacity: 0;
      transform: translateY(8px);
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .task-item.removing {
      animation: slideOut 0.25s cubic-bezier(.4,0,.2,1) forwards;
    }

    @keyframes slideOut {
      to { opacity: 0; transform: translateX(-16px); }
    }

    .task-num {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      width: 20px;
      flex-shrink: 0;
      text-align: right;
      user-select: none;
    }

    /* ── Custom Checkbox ───────────────────────── */
    .checkbox-wrap {
      position: relative;
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-wrap input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      z-index: 2;
      margin: 0;
    }

    .checkbox-visual {
      width: 18px;
      height: 18px;
      border: 1px solid var(--border2);
      border-radius: 2px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--trans);
    }

    .checkbox-wrap input:checked ~ .checkbox-visual {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox-visual::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid var(--bg);
      border-top: none;
      border-left: none;
      transform: rotate(45deg) scale(0);
      transition: transform 0.15s;
      margin-top: -2px;
    }

    .checkbox-wrap input:checked ~ .checkbox-visual::after {
      transform: rotate(45deg) scale(1);
    }

    /* ── Task Text ─────────────────────────────── */
    .task-text {
      flex: 1;
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.3;
      cursor: pointer;
      transition: color var(--trans);
      letter-spacing: 0.01em;
    }

    .task-item.done .task-text {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-color: var(--muted);
    }

    .task-item.done .task-num {
      color: #333;
    }

    /* ── Delete Button ─────────────────────────── */
    .del-btn {
      background: transparent;
      border: none;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--muted);
      border-radius: var(--radius);
      transition: color var(--trans), background var(--trans);
      flex-shrink: 0;
      opacity: 0;
    }

    .task-item:hover .del-btn { opacity: 1; }

    .del-btn:hover {
      color: var(--danger);
      background: rgba(255,88,88,0.08);
    }

    .del-btn svg {
      width: 14px;
      height: 14px;
    }

    /* ── Empty State ───────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 64px 0 32px;
      color: var(--muted);
      animation: slideIn 0.3s forwards;
      opacity: 0;
    }

    .empty-state .empty-icon {
      font-size: 32px;
      filter: grayscale(1) opacity(0.4);
    }

    .empty-state p {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Footer ────────────────────────────────── */
    .footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-stat {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-stat span {
      color: var(--accent);
      font-weight: 500;
    }

    .clear-done-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 12px;
      cursor: pointer;
      border-radius: var(--radius);
      transition: all var(--trans);
      display: none;
    }

    .clear-done-btn.visible { display: block; }
    .clear-done-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* ── Responsive ────────────────────────────── */
    @media (max-width: 500px) {
      body { padding: 32px 16px 60px; }
      .app-title { font-size: 44px; }
      .task-text { font-size: 16px; }
      .del-btn { opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-left">
        <span class="app-label">✦ Gestão de Tarefas</span>
        <h1 class="app-title">To<em>do</em><br>List.</h1>
      </div>
      <div class="header-right">
        <div class="task-counter">
          <strong id="countNum">0</strong>&nbsp;/&nbsp;10
        </div>
        <span class="app-label" id="countLabel">tarefas</span>
      </div>
    </header>

    <!-- ── Progress ── -->
    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <!-- ── Toast ── -->
    <div class="toast" id="toast"></div>

    <!-- ── Input ── -->
    <div class="input-section">
      <input
        class="task-input"
        id="taskInput"
        type="text"
        placeholder="Escreva uma nova tarefa…"
        autocomplete="off"
        maxlength="120"
      />
      <button class="add-btn" id="addBtn">+ Adicionar</button>
    </div>

    <!-- ── Dots limit indicator ── -->
    <div class="limit-bar">
      <span class="limit-label">Limite de tarefas</span>
      <div class="limit-dots" id="limitDots"></div>
    </div>

    <!-- ── Task List ── -->
    <ul class="task-list" id="taskList"></ul>

    <!-- ── Footer ── -->
    <footer class="footer">
      <span class="footer-stat">
        <span id="doneCount">0</span> concluída(s)
      </span>
      <button class="clear-done-btn" id="clearDoneBtn">
        Limpar concluídas
      </button>
    </footer>

  </div>

  <script>
    const API = 'http://localhost:5000/api';

    // ─── DOM Refs ───────────────────────────────────
    const taskInput   = document.getElementById('taskInput');
    const addBtn      = document.getElementById('addBtn');
    const taskList    = document.getElementById('taskList');
    const countNum    = document.getElementById('countNum');
    const countLabel  = document.getElementById('countLabel');
    const progressFill= document.getElementById('progressFill');
    const limitDots   = document.getElementById('limitDots');
    const doneCount   = document.getElementById('doneCount');
    const clearDoneBtn= document.getElementById('clearDoneBtn');
    const toast       = document.getElementById('toast');

    let tasks = [];
    let toastTimer = null;

    // ─── Toast ──────────────────────────────────────
    function showToast(msg, type = 'info') {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.className = `toast ${type} show`;
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ─── Render ─────────────────────────────────────
    function render() {
      const total = tasks.length;
      const done  = tasks.filter(t => t.completed).length;

      countNum.textContent = total;
      countLabel.textContent = total === 1 ? 'tarefa' : 'tarefas';

      const pct = total > 0 ? (done / total) * 100 : 0;
      progressFill.style.width = pct + '%';

      doneCount.textContent = done;
      clearDoneBtn.classList.toggle('visible', done > 0);

      // dots
      limitDots.innerHTML = '';
      for (let i = 0; i < 10; i++) {
        const d = document.createElement('span');
        d.className = 'dot';
        if (i < total) {
          d.classList.add(tasks[i].completed ? 'filled-done' : 'filled');
        }
        limitDots.appendChild(d);
      }

      // list
      taskList.innerHTML = '';

      if (total === 0) {
        const empty = document.createElement('li');
        empty.className = 'empty-state';
        empty.innerHTML = `
          <span class="empty-icon">◌</span>
          <p>Nenhuma tarefa por aqui</p>
        `;
        taskList.appendChild(empty);
        return;
      }

      tasks.forEach((task, idx) => {
        const li = document.createElement('li');
        li.className = 'task-item' + (task.completed ? ' done' : '');
        li.dataset.id = task.id;

        li.innerHTML = `
          <span class="task-num">${String(idx + 1).padStart(2, '0')}</span>
          <label class="checkbox-wrap" title="Marcar como concluída">
            <input type="checkbox" ${task.completed ? 'checked' : ''}/>
            <span class="checkbox-visual"></span>
          </label>
          <span class="task-text">${escapeHtml(task.text)}</span>
          <button class="del-btn" title="Remover tarefa">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        `;

        li.querySelector('input[type=checkbox]').addEventListener('change', () => toggleTask(task.id));
        li.querySelector('.task-text').addEventListener('click', () => toggleTask(task.id));
        li.querySelector('.del-btn').addEventListener('click', () => removeTask(task.id, li));

        taskList.appendChild(li);
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ─── API Calls ──────────────────────────────────
    async function loadTasks() {
      try {
        const res = await fetch(`${API}/tasks`);
        tasks = await res.json();
        render();
      } catch {
        showToast('Não foi possível conectar ao servidor.', 'error');
      }
    }

    async function addTask() {
      const text = taskInput.value.trim();
      if (!text) {
        showToast('Digite uma tarefa antes de adicionar.', 'error');
        taskInput.focus();
        return;
      }

      try {
        const res = await fetch(`${API}/tasks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        const data = await res.json();

        if (!res.ok) {
          showToast(data.error, 'error');
          return;
        }

        tasks.push(data);
        taskInput.value = '';
        taskInput.focus();
        render();
        showToast('Tarefa adicionada.', 'success');
      } catch {
        showToast('Erro ao adicionar tarefa.', 'error');
      }
    }

    async function removeTask(id, li) {
      li.classList.add('removing');
      await new Promise(r => setTimeout(r, 240));

      try {
        await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
        tasks = tasks.filter(t => t.id !== id);
        render();
        showToast('Tarefa removida.', 'info');
      } catch {
        showToast('Erro ao remover tarefa.', 'error');
        li.classList.remove('removing');
      }
    }

    async function toggleTask(id) {
      try {
        const res = await fetch(`${API}/tasks/${id}`, { method: 'PATCH' });
        const updated = await res.json();
        tasks = tasks.map(t => t.id === id ? updated : t);
        render();
      } catch {
        showToast('Erro ao atualizar tarefa.', 'error');
      }
    }

    async function clearDone() {
      const done = tasks.filter(t => t.completed);
      for (const t of done) {
        await fetch(`${API}/tasks/${t.id}`, { method: 'DELETE' });
      }
      tasks = tasks.filter(t => !t.completed);
      render();
      showToast(`${done.length} tarefa(s) concluída(s) removida(s).`, 'success');
    }

    // ─── Events ─────────────────────────────────────
    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });
    clearDoneBtn.addEventListener('click', clearDone);

    // ─── Init ────────────────────────────────────────
    loadTasks();
  </script>
</body>
</html>
